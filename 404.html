<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-lang-key="404Title">404 - Page Not Found | Barber Bliss</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./src/index.css">
</head>
<body class="bg-background text-foreground font-sans antialiased flex flex-col min-h-screen">
    <main class="flex-grow flex items-center justify-center p-6">
        <div class="text-center bg-card/80 glassmorphic p-10 rounded-xl shadow-2xl max-w-md w-full animated-gradient-border">
            <h1 class="text-7xl font-extrabold text-yellow-400 mb-4">404</h1>
            <h2 class="text-3xl font-bold mb-6" data-lang-key="404Heading">Page Not Found</h2>
            <p class="text-muted-foreground mb-8" data-lang-key="404Message">Oops! The page you're looking for doesn't exist or has been moved.</p>
            <a href="index.html" class="btn-primary py-3 px-6 text-lg rounded-full animated-gradient-border hover:scale-105 transition-transform duration-300" data-lang-key="goHomeButton">Go to Homepage</a>
        </div>
    </main>

    <footer class="bg-background border-t border-input py-8 px-6 text-center text-muted-foreground">
        <p>&copy; 2024 Barber Bliss. <span data-lang-key="rightsReserved">All rights reserved.</span></p>
    </footer>

    <script>
        const translations = {
            en: {
                "404Title": "404 - Page Not Found | Barber Bliss",
                "404Heading": "Page Not Found",
                "404Message": "Oops! The page you're looking for doesn't exist or has been moved.",
                "goHomeButton": "Go to Homepage",
                "rightsReserved": "All rights reserved."
            },
            he: {
                "404Title": "404 - העמוד לא נמצא | ברבר בליס",
                "404Heading": "העמוד לא נמצא",
                "404Message": "אופס! העמוד שאתה מחפש לא קיים או הועבר.",
                "goHomeButton": "חזור לדף הבית",
                "rightsReserved": "כל הזכויות שמורות."
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en';
        let currentTheme = localStorage.getItem('theme') || 'light';

        document.documentElement.classList.add(currentTheme);
        document.documentElement.setAttribute('lang', currentLang);
        document.documentElement.classList.toggle('rtl', currentLang === 'he');


        document.querySelectorAll('[data-lang-key]').forEach(element => {
            const key = element.getAttribute('data-lang-key');
            if (translations[currentLang] && translations[currentLang][key]) {
                if (element.tagName === 'TITLE') {
                    document.title = translations[currentLang][key];
                } else {
                    element.textContent = translations[currentLang][key];
                }
            }
        });
    </script>
</body>
</html>
